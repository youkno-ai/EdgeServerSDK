image: atlassian/default-image:4

pipelines:
  tags:
    "sdk-*":
      - step:
          name: Publish TypeScript SDK
          image: node:20
          caches:
            - node
          script:
            - cd ts
            - npm ci
            - npm run build
            - npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
            - npm publish --access public
      - step:
          name: Publish Kotlin SDK
          image: gradle:8.10-jdk21
          caches:
            - gradle
          script:
            - cd kotlin
            - export ORG_GRADLE_PROJECT_mavenCentralUsername="$SONATYPE_USERNAME"
            - export ORG_GRADLE_PROJECT_mavenCentralPassword="$SONATYPE_PASSWORD"
            - export ORG_GRADLE_PROJECT_signingInMemoryKey="$SIGNING_KEY"
            - export ORG_GRADLE_PROJECT_signingInMemoryKeyPassword="$SIGNING_PASSWORD"
            - ./gradlew --no-daemon publishAllPublicationsToMavenCentralRepository
          services: []
      - step:
          name: Validate Swift Package
          image: swift:5.10
          script:
            - cd swift
            - swift build

definitions:
  caches:
    gradle: ~/.gradle/caches
